services:
  weyell:
    build:
      context: .
      args:
        VITE_DISCORD_CLIENT_ID: ${VITE_DISCORD_CLIENT_ID:-}
    image: weyell:latest
    container_name: weyell
    ports:
      - "3333:3333"
    environment:
      - PORT=3333
      - DEMO_MODE=${DEMO_MODE:-true}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID:-}
    restart: unless-stopped
