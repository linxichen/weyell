services:
  weyell:
    build:
      context: .
      args:
        VITE_DISCORD_CLIENT_ID: ${VITE_DISCORD_CLIENT_ID:-}
    image: weyell:latest
    container_name: weyell
    ports:
      - "3333:3333"
    environment:
      - PORT=3333
      - DEMO_MODE=${DEMO_MODE:-true}
      - HERMES_GATEWAY_URL=${HERMES_GATEWAY_URL:-ws://host.docker.internal:18789/}
      - VITE_DISCORD_CLIENT_ID=${VITE_DISCORD_CLIENT_ID:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
